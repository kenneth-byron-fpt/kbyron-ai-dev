# Fly.io configuration for Agent Farm webhook server
app = "agent-farm-kbyron"
primary_region = "sea"  # Seattle — closest to us-west-2 (Recall.ai region)

[build]
  dockerfile = "webhook/Dockerfile"

[env]
  AGENT_DIR = "/app/agents"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
